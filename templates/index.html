<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Segregation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f9; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; }
        .status-box { padding: 20px; text-align: center; font-size: 24px; font-weight: bold; color: white; border-radius: 10px; }
        .val-box { font-size: 36px; font-weight: bold; color: #2c3e50; }
        .sub-val-box { font-size: 24px; font-weight: bold; color: #1a4273; }
        .label { color: #7f8c8d; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .gallery-img { height: 150px; object-fit: cover; width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
    <div class="text-center mb-4">
        <h2> Smart Segregation System</h2>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div id="status-display" class="status-box bg-success">
                SYSTEM READY
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-6">
            <div class="card text-center p-3">
                <div class="label">TDS Level (PPM)</div>
                <div id="tds-val" class="val-box">0</div>
            </div>
        </div>
        <div class="col-6">
            <div class="card text-center p-3">
                <div class="label">Batch Volume</div>
                <div class="val-box"><span id="vol-val">0.00</span> L</div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-4">
            <div class="card text-center p-3">
                <div class="label">Decision Time</div>
                <div class="sub-val-box"><span id="latency-val">0.000</span> s</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card text-center p-3">
                <div class="label">Active Valve</div>
                <div id="valve-val" class="sub-val-box" style="font-size: 20px;">WAITING</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card text-center p-3">
                <div class="label">Open Duration</div>
                <div class="sub-val-box"><span id="duration-val">0.0</span> s</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-white fw-bold">📸 Multispectral Analysis</div>
        <div class="card-body">
            <div class="row text-center g-2">
                <div class="col-3">
                    <small class="text-danger fw-bold">RED</small>
                    <img src="{{ url_for('static', filename='scan_red.jpg') }}" class="gallery-img border border-2 border-danger" id="img-red" alt="Red Channel Scan">
                </div>
                <div class="col-3">
                    <small class="text-success fw-bold">GREEN</small>
                    <img src="{{ url_for('static', filename='scan_green.jpg') }}" class="gallery-img border border-2 border-success" id="img-green" alt="Green Channel Scan">
                </div>
                <div class="col-3">
                    <small class="text-primary fw-bold">BLUE</small>
                    <img src="{{ url_for('static', filename='scan_blue.jpg') }}" class="gallery-img border border-2 border-primary" id="img-blue" alt="Blue Channel Scan">
                </div>
                <div class="col-3">
                    <small class="text-dark fw-bold">WHITE</small>
                    <img src="{{ url_for('static', filename='scan_white.jpg') }}" class="gallery-img border border-2 border-dark" id="img-white" alt="White Channel Scan">
                </div>
            </div>
            <div class="text-center mt-3 fw-bold fs-5">
                AI Decision: <span id="decision-text" class="text-primary">WAITING</span>
            </div>
        </div>
    </div>
</div>

<script>
    function updateDashboard() {
        fetch('/status')
            .then(response => response.json())
            .then(data => {
                // Update Text
                document.getElementById('status-display').innerText = data.status;
                document.getElementById('tds-val').innerText = data.tds;
                document.getElementById('vol-val').innerText = data.vol;
                document.getElementById('latency-val').innerText = data.latency;
                document.getElementById('valve-val').innerText = data.valve;
                document.getElementById('duration-val').innerText = data.duration;
                document.getElementById('decision-text').innerText = data.decision;
                
                // Update Colors
                let statusBox = document.getElementById('status-display');
                statusBox.className = "status-box bg-" + data.color;

                // Refresh Images (Cache breaking with timestamp)
                let t = new Date().getTime();
                document.getElementById("img-red").src = "/static/scan_red.jpg?t=" + t;
                document.getElementById("img-green").src = "/static/scan_green.jpg?t=" + t;
                document.getElementById("img-blue").src = "/static/scan_blue.jpg?t=" + t;
                document.getElementById("img-white").src = "/static/scan_white.jpg?t=" + t;
            })
            .catch(error => console.error('Error:', error));
    }

    // Refresh every 1 second
    setInterval(updateDashboard, 1000);
</script>

</body>
</html>
